<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ficha de Jogador - Varzea Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #121212 !important; color: #f1f1f1; font-family: 'Segoe UI', sans-serif; }
        .street-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        .neon-text { color: #39ff14 !important; }
        .card-dark { background-color: #1e1e1e !important; border: 1px solid #333 !important; color: #fff; }
        
        .form-control, .form-select { 
            background-color: #2a2a2a !important; 
            border: 1px solid #444 !important; 
            color: #ffffff !important; 
        }
        .form-control:focus, .form-select:focus { 
            border-color: #39ff14 !important; 
            box-shadow: 0 0 0 0.25rem rgba(57, 255, 20, 0.25) !important; 
        }
        
        .btn-street-primary { background-color: #39ff14; color: #000; border: none; font-weight: bold; }
        .btn-street-outline { border: 1px solid #555; color: #ddd; background: transparent; }
    </style>
</head>
<body>

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container" style="max-width: 600px;">
        <div class="card card-dark shadow p-4">
            <h4 class="mb-4 fw-bold neon-text street-font">
                <i class="bi bi-person-plus me-2"></i> FICHA DE JOGADOR
            </h4>
            
            <form th:action="@{/jogadores/salvar}" th:object="${jogador}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Nome Completo</label>
                    <input type="text" th:field="*{nome}" class="form-control" required placeholder="Digite o nome...">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Posição</label>
                    <select class="form-select" th:field="*{posicao}" required>
                        <option value="" class="text-dark">Selecione a posição...</option>
                        <option value="Goleiro">Goleiro</option>
                        <option value="Zagueiro">Zagueiro</option>
                        <option value="Lateral">Lateral</option>
                        <option value="Meio Campo">Meio Campo</option>
                        <option value="Atacante">Atacante</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Equipe Atual</label>
                    <select class="form-select" th:field="*{time.id}" required>
                        <option value="" class="text-dark">Selecione uma equipe...</option>
                        <option th:each="t : ${listaTimes}" th:value="${t.id}" th:text="${t.nome}"></option>
                    </select>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a th:href="@{/jogadores/listar}" class="btn btn-street-outline px-4">Cancelar</a>
                    <button type="submit" class="btn btn-street-primary px-4">Salvar Jogador</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
