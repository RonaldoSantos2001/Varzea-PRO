<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Torneios - Varzea Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #f1f1f1; font-family: 'Segoe UI', sans-serif; }
        .street-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        .navbar-futebol { background-color: #000 !important; border-bottom: 4px solid #39ff14; }
        .neon-text { color: #39ff14 !important; }
        .card-dark { background-color: #1e1e1e; border: 1px solid #333; }
        .btn-street-primary { background-color: #39ff14; color: #000; border: none; font-weight: bold; }
        .btn-street-outline { border: 1px solid #555; color: #ddd; background: transparent; }
        .table-dark { background-color: #1e1e1e; }
    </style>
</head>
<body>

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold neon-text street-font mb-0"><i class="bi bi-trophy me-2"></i> Torneios Criados</h2>
            <a th:href="@{/campeonatos/novo}" class="btn btn-street-primary"><i class="bi bi-plus-lg me-1"></i> Novo Torneio</a>
        </div>

        <div class="card card-dark shadow">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0">
                        <thead class="table-secondary text-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nome do Torneio</th>
                                <th class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="camp : ${campeonatos}" th:if="${camp != null}">
                                <td th:text="${camp.id}"></td>
                                <td class="fw-bold text-white" th:text="${camp.nome}"></td>
                                <td class="text-center">
                                    <a th:href="@{/campeonatos/editar/{id}(id=${camp.id})}" class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></a>
                                    <a th:href="@{/campeonatos/excluir/{id}(id=${camp.id})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(campeonatos)}">
                                <td colspan="3" class="text-center py-4 text-muted">Nenhum torneio cadastrado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
