<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agendar Partida - Varzea Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #121212 !important; color: #ffffff !important; font-family: 'Segoe UI', sans-serif; }
        .card-dark { background-color: #1e1e1e !important; border: 1px solid #333 !important; }
        .form-label { color: #ffffff !important; font-weight: bold; }
        .form-control, .form-select { 
            background-color: #2a2a2a !important; 
            border: 1px solid #444 !important; 
            color: #ffffff !important; 
        }
        .form-control:focus, .form-select:focus { border-color: #39ff14 !important; }
        .btn-street-primary { background-color: #39ff14; color: #000; border: none; font-weight: bold; }
        .btn-street-outline { border: 1px solid #555; color: #ddd; background: transparent; }
    </style>
</head>
<body>

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container" style="max-width: 700px;">
        <div class="card card-dark shadow p-4">
            <h4 class="mb-4 text-white fw-bold"><i class="bi bi-stopwatch me-2"></i> AGENDAR PARTIDA</h4>
            
            <form th:action="@{/partidas/salvar}" th:object="${partida}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Data e Hora</label>
                        <input type="datetime-local" th:field="*{dataHora}" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Torneio</label>
                        <select class="form-select" th:field="*{campeonato.id}" required>
                            <option value="" class="text-dark">Selecione...</option>
                            <option th:each="camp : ${listaCampeonatos}" th:value="${camp.id}" th:text="${camp.nome}"></option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Equipe Mandante</label>
                        <select class="form-select" th:field="*{timeMandante.id}" required>
                            <option value="" class="text-dark">Selecione...</option>
                            <option th:each="time : ${listaTimes}" th:value="${time.id}" th:text="${time.nome}"></option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Equipe Visitante</label>
                        <select class="form-select" th:field="*{timeVisitante.id}" required>
                            <option value="" class="text-dark">Selecione...</option>
                            <option th:each="time : ${listaTimes}" th:value="${time.id}" th:text="${time.nome}"></option>
                        </select>
                    </div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-3">
                    <a th:href="@{/partidas/listar}" class="btn btn-street-outline px-4">Cancelar</a>
                    <button type="submit" class="btn btn-street-primary px-4">Salvar Partida</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
