<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Varzea Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #f1f1f1; font-family: 'Segoe UI', sans-serif; }
        .street-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        .neon-text { color: #39ff14 !important; }
        .card-dark { background-color: #1e1e1e; border: 1px solid #333; width: 100%; max-width: 420px; }
        
        .form-control { background-color: #2a2a2a !important; border: 1px solid #444 !important; color: #ffffff !important; }
        .form-control:focus { border-color: #39ff14 !important; box-shadow: 0 0 0 0.25rem rgba(57, 255, 20, 0.25) !important; color: #ffffff !important; }
        .form-control::placeholder { color: #aaaaaa !important; }
        .input-group-text { background-color: #121212 !important; border: 1px solid #444 !important; color: #39ff14 !important; }
        .texto-cinza { color: #cccccc !important; }

        .btn-street-primary { background-color: #39ff14; color: #000; border: none; font-weight: bold; width: 100%; }
        .btn-street-primary:hover { background-color: #32e612; color: #000; }
        .link-neon { color: #39ff14; text-decoration: none; font-weight: bold; }
        .link-neon:hover { text-decoration: underline; color: #32e612; }
    </style>
</head>
<body>

    <div class="container d-flex align-items-center justify-content-center vh-100">
        <div class="card card-dark shadow-lg p-4">
            <div class="text-center mb-4">
                <h2 class="fw-bold neon-text street-font d-flex align-items-center justify-content-center">
                    <span class="me-2">⚽</span> VARZEA PRO
                </h2>
                <p class="texto-cinza text-uppercase small tracking-wide">Acesso Restrito ao Sistema</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger fw-bold text-center small py-2" role="alert">
                Usuário ou senha inválidos.
            </div>
            <div th:if="${param.logout}" class="alert alert-success fw-bold text-center small py-2" role="alert">
                Sessão encerrada com sucesso.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold text-white">Usuário</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="username" name="username" class="form-control form-control-lg" autofocus required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label fw-bold text-white">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" name="password" class="form-control form-control-lg" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-street-primary btn-lg mb-3">ENTRAR</button>
                
                <div class="text-center small mt-2">
                    <span class="texto-cinza">Não possui conta?</span> 
                    <a th:href="@{/registro}" class="link-neon ms-1">Registre-se aqui</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
