<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Partidas - Varzea Pro</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
        <style>
            body {
                background-color: #121212;
                color: #f1f1f1;
                font-family: 'Segoe UI', sans-serif;
            }
            .street-font {
                font-family: 'Oswald', sans-serif;
                text-transform: uppercase;
            }
            .neon-text {
                color: #39ff14 !important;
            }
            .table-dark {
                background-color: #1e1e1e !important;
                border: 1px solid #333;
            }
            .btn-street-primary {
                background-color: #39ff14;
                color: #000;
                border: none;
                font-weight: bold;
            }
            .table thead {
                background-color: #2a2a2a !important;
                color: #fff;
            }
        </style>
    </head>
    <body>

        <div th:replace="~{fragments :: navbar}"></div>

        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold neon-text street-font mb-0"><i class="bi bi-calendar-check me-2"></i> Partidas Agendadas</h2>
                <a th:href="@{/partidas/novo}" class="btn btn-street-primary">
                    <i class="bi bi-plus-lg me-1"></i> NOVA PARTIDA
                </a>
            </div>

            <div class="card bg-transparent border-0">
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Data/Hora</th>
                                <th>Torneio</th>
                                <th>Mandante</th>
                                <th>X</th>
                                <th>Visitante</th>
                                <th class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="partida : ${partidas}">
                                <td th:text="${#temporals.format(partida.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
                                <td th:text="${partida.campeonato?.nome}"></td>
                                <td th:text="${partida.timeMandante?.nome}"></td>
                                <td class="fw-bold text-success">VS</td>
                                <td th:text="${partida.timeVisitante?.nome}"></td>
                                <td class="text-center">
                                    <a th:href="@{/partidas/editar/{id}(id=${partida.id})}" class="btn btn-sm btn-outline-warning me-2">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/partidas/excluir/{id}(id=${partida.id})}" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(partidas)}">
                                <td colspan="6" class="text-center py-4 text-muted">Nenhuma partida agendada.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </body>
</html>
