<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Registro - Varzea Pro</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
        <style>
            body {
                background-color: #121212;
                color: #f1f1f1;
                font-family: 'Segoe UI', sans-serif;
            }
            .street-font {
                font-family: 'Oswald', sans-serif;
                text-transform: uppercase;
            }
            .neon-text {
                color: #39ff14 !important;
            }
            .card-dark {
                background-color: #1e1e1e;
                border: 1px solid #333;
                width: 100%;
                max-width: 450px;
            }

            .form-control {
                background-color: #2a2a2a !important;
                border: 1px solid #444 !important;
                color: #ffffff !important;
            }
            .form-control:focus {
                border-color: #39ff14 !important;
                box-shadow: 0 0 0 0.25rem rgba(57, 255, 20, 0.25) !important;
                color: #ffffff !important;
            }
            .form-control::placeholder {
                color: #aaaaaa !important;
            }
            .texto-cinza {
                color: #cccccc !important;
            }

            .btn-street-primary {
                background-color: #39ff14;
                color: #000;
                border: none;
                font-weight: bold;
                width: 100%;
            }
            .btn-street-primary:hover {
                background-color: #32e612;
                color: #000;
            }
            .link-neon {
                color: #39ff14;
                text-decoration: none;
                font-weight: bold;
            }
            .link-neon:hover {
                text-decoration: underline;
                color: #32e612;
            }
        </style>
    </head>
    <body>

        <div class="container d-flex align-items-center justify-content-center vh-100">
            <div class="card card-dark shadow-lg p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold neon-text street-font d-flex align-items-center justify-content-center">
                        <span class="me-2">⚽</span> NOVO ADMINISTRADOR
                    </h2>
                    <p class="texto-cinza text-uppercase small tracking-wide">Crie sua conta de acesso ao sistema</p>
                </div>

                <form th:action="@{/registro/salvar}" th:object="${usuario}" method="post">

                    <div th:if="${erro != null}" class="alert alert-danger fw-bold text-center" style="background-color: #ff4d4d; color: white; border: none;">
                        <span th:text="${erro}"></span>
                    </div>

                    <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger" style="background-color: #ff4d4d; color: white; border: none;">
                        <ul class="mb-0">
                            <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                        </ul>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-white">Nome Completo</label>
                        <input type="text" th:field="*{nomeCompleto}" class="form-control" placeholder="Ex: Ronaldo de Oliveira" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-white">Nome de Usuário (Login)</label>
                        <input type="text" th:field="*{username}" class="form-control" placeholder="Ex: ronaldo.santos" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white fw-bold">Senha</label>
                        <input type="password" th:field="*{senha}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-white fw-bold">Confirmar Senha</label>
                        <input type="password" id="confirmaSenha" name="confirmaSenha" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-street-primary btn-lg mb-3">REGISTRAR ADMINISTRADOR</button>

                    <div class="text-center small mt-2">
                        <span class="texto-cinza">Já possui uma conta?</span> 
                        <a th:href="@{/login}" class="link-neon ms-1">Voltar ao Login</a>
                    </div>
                </form>
            </div>
        </div>

    </body>
</html>
