<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Jogadores - Varzea Pro</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
        <style>
            body {
                background-color: #121212;
                color: #ffffff !important;
                font-family: sans-serif;
            }
            .card-dark {
                background-color: #1e1e1e;
                border: 1px solid #333;
            }

            /* Força labels e textos a serem brancos */
            label, .form-label {
                color: #ffffff !important;
                font-weight: bold;
            }

            /* Inputs e Selects: Força fundo escuro e texto branco */
            .form-control, .form-select {
                background-color: #2a2a2a !important;
                border: 1px solid #444 !important;
                color: #ffffff !important;
            }

            /* Corrige o texto dentro das opções do select */
            .form-select option {
                background-color: #2a2a2a !important;
                color: #ffffff !important;
            }

            /* placeholder visível */
            .form-control::placeholder {
                color: #aaaaaa !important;
            }

            .btn-success {
                background-color: #39ff14;
                border: none;
                color: #000;
                font-weight: bold;
            }
        </style>
    </head>
    <body>

        <div th:replace="~{fragments :: navbar}"></div>

        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold neon-text street-font mb-0"><i class="bi bi-people me-2"></i> Jogadores Cadastrados</h2>
                <a th:href="@{/jogadores/novo}" class="btn btn-success fw-bold text-black px-4">
                    <i class="bi bi-plus-lg me-1"></i> NOVO JOGADOR
                </a>
            </div>

            <div class="card card-dark shadow">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-dark table-hover mb-0">
                            <thead class="table-secondary text-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Nome do Jogador</th>
                                    <th>Posição</th>
                                    <th>Equipe</th>
                                    <th class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="jog : ${jogadores}" th:if="${jog != null}">
                                    <td th:text="${jog.id}"></td>
                                    <td class="fw-bold" th:text="${jog.nome}"></td>
                                    <td th:text="${jog.posicao}"></td>
                                    <td th:text="${jog.time?.nome ?: 'Sem Equipe'}"></td>
                                    <td class="text-center">
                                        <a th:href="@{/jogadores/editar/{id}(id=${jog.id})}" class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></a>
                                        <a th:href="@{/jogadores/excluir/{id}(id=${jog.id})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(jogadores)}">
                                    <td colspan="5" class="text-center py-4 text-muted">Nenhum jogador cadastrado.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </body>
</html>
